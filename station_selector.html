<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Station and Transport Mode Selector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
            color: #333;
        }

        h1, h2 {
            color: #4CAF50;
        }

        label {
            font-weight: bold;
        }

        select, input[type="checkbox"], button {
            margin: 10px 0;
            padding: 5px;
            font-size: 16px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            padding: 10px 20px;
        }

        button:hover {
            background-color: #45a049;
        }

        #transportModes {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        #transportModes label {
            display: flex;
            align-items: center;
            background-color: #e0e0e0;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        #transportModes input[type="checkbox"] {
            margin-right: 10px;
        }

        p {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Choose Metro Station and Transport Modes</h1>

    <!-- Station Selector -->
    <label for="station">Station:</label>
    <select id="station"></select>
    <button onclick="submitStation()">Set Station</button>
    <p>Current site_id: <span id="currentSiteId">Loading...</span></p>

    <!-- Transport Mode Selector -->
    <h2>Transport Modes:</h2>
    <div id="transportModes">
        <label><input type="checkbox" name="transportMode" value="METRO"> Tunnelbana </label>
        <label><input type="checkbox" name="transportMode" value="BUS"> Buss </label>
        <label><input type="checkbox" name="transportMode" value="TRAM"> Tvärbana </label>
        <label><input type="checkbox" name="transportMode" value="TRAIN"> Pendeltåg </label>
    </div>
    <button onclick="submitTransportModes()">Set Transport Modes</button>
    <p>Current transport modes: <span id="currentTransportModes">Loading...</span></p>

    <script>
        async function fetchCurrentSite() {
            const response = await fetch("/get-site");
            const data = await response.json();
            document.getElementById("currentSiteId").innerText = data.site_id;
            document.getElementById("station").value = data.site_id;
        }

        async function submitStation() {
            const siteId = document.getElementById("station").value;
            await fetch("/set-site", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ site_id: siteId })
            });
            fetchCurrentSite(); // Refresh displayed site_id
        }

        async function fetchCurrentTransportModes() {
            const response = await fetch("/get-transport-modes");
            const data = await response.json();
            document.getElementById("currentTransportModes").innerText = data.transport_modes.join(", ");
            const transportModes = document.getElementsByName("transportMode");
            transportModes.forEach(checkbox => {
                checkbox.checked = data.transport_modes.includes(checkbox.value);
            });
        }

        async function submitTransportModes() {
            const transportModes = document.getElementsByName("transportMode");
            const selectedModes = Array.from(transportModes)
                .filter(checkbox => checkbox.checked)
                .map(checkbox => checkbox.value);
            await fetch("/set-transport-modes", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ transport_modes: selectedModes })
            });
            fetchCurrentTransportModes(); // Refresh displayed transport modes
        }

        async function fetchStations() {
            const response = await fetch("/stations");
            const data = await response.json();
            const select = document.getElementById("station");
            data.forEach(station => {
                const option = document.createElement("option");
                option.value = station.id;
                option.textContent = station.name;
                select.appendChild(option);
            });
        }

        // Initial data fetch
        fetchCurrentSite();
        fetchCurrentTransportModes();
        fetchStations();
    </script>
</body>
</html>
